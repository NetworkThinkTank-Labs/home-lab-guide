# Starter Home Lab Topology - Containerlab
# NetworkThinkTank-Labs/home-lab-guide
#
# This topology creates a basic home lab environment with:
# - 1 Firewall (Linux-based)
# - 1 Core Switch (Linux network multitool)
# - 3 Servers across different VLANs
#
# Usage:
#   sudo containerlab deploy -t starter-lab.clab.yml
#   sudo containerlab destroy -t starter-lab.clab.yml

name: starter-lab

topology:
  nodes:
      # Firewall / Gateway
          firewall:
                kind: linux
                      image: ghcr.io/srl-labs/network-multitool
                            exec:
                                    - ip addr add 10.0.0.1/24 dev eth1
                                            - ip addr add 10.0.10.1/24 dev eth2
                                                    - ip addr add 10.0.20.1/24 dev eth3
                                                            - sysctl -w net.ipv4.ip_forward=1

                                                                # Core Switch
                                                                    core-switch:
                                                                          kind: linux
                                                                                image: ghcr.io/srl-labs/network-multitool
                                                                                      exec:
                                                                                              - ip addr add 10.0.0.2/24 dev eth1
                                                                                                      - ip addr add 10.0.10.2/24 dev eth2
                                                                                                              - ip addr add 10.0.20.2/24 dev eth3
                                                                                                                      - ip addr add 10.0.30.2/24 dev eth4
                                                                                                                      
                                                                                                                          # Management Server (VLAN 10)
                                                                                                                              mgmt-server:
                                                                                                                                    kind: linux
                                                                                                                                          image: alpine:latest
                                                                                                                                                exec:
                                                                                                                                                        - ip addr add 10.0.10.10/24 dev eth1
                                                                                                                                                                - ip route add default via 10.0.10.1
                                                                                                                                                                
                                                                                                                                                                    # Lab Server (VLAN 20)
                                                                                                                                                                        lab-server:
                                                                                                                                                                              kind: linux
                                                                                                                                                                                    image: alpine:latest
                                                                                                                                                                                          exec:
                                                                                                                                                                                                  - ip addr add 10.0.20.10/24 dev eth1
                                                                                                                                                                                                          - ip route add default via 10.0.20.1
                                                                                                                                                                                                          
                                                                                                                                                                                                              # Application Server (VLAN 30)
                                                                                                                                                                                                                  app-server:
                                                                                                                                                                                                                        kind: linux
                                                                                                                                                                                                                              image: alpine:latest
                                                                                                                                                                                                                                    exec:
                                                                                                                                                                                                                                            - ip addr add 10.0.30.10/24 dev eth1
                                                                                                                                                                                                                                                    - ip route add default via 10.0.30.1
                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                      links:
                                                                                                                                                                                                                                                          - endpoints: ["firewall:eth1", "core-switch:eth1"]
                                                                                                                                                                                                                                                              - endpoints: ["firewall:eth2", "mgmt-server:eth1"]
                                                                                                                                                                                                                                                                  - endpoints: ["firewall:eth3", "lab-server:eth1"]
                                                                                                                                                                                                                                                                      - endpoints: ["core-switch:eth2", "mgmt-server:eth1"]
                                                                                                                                                                                                                                                                          - endpoints: ["core-switch:eth3", "lab-server:eth1"]
                                                                                                                                                                                                                                                                              - endpoints: ["core-switch:eth4", "app-server:eth1"]
